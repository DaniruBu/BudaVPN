---
admin_user: admin
admin_group: sudo

common_packages:
  - sudo
  - curl
  - ca-certificates
  - openssl
  - python3
  - tzdata
  - ufw

docker_install_script_url: https://get.docker.com
docker_install_script_path: /tmp/get-docker.sh

common_firewall_enabled: true
common_tuning_enabled: true

common_firewall_default_incoming_policy: deny
common_firewall_default_outgoing_policy: allow

common_firewall_allow_tcp_ports:
  - 22

common_firewall_limit_tcp_ports:
  - 22

common_modules_load:
  - tcp_bbr
  - nf_conntrack

common_sysctl_params:
  fs.file-max: "67108864"

  net.core.default_qdisc: "fq"
  net.core.netdev_max_backlog: "32768"
  net.core.optmem_max: "262144"
  net.core.somaxconn: "4096"

  net.ipv4.tcp_congestion_control: "bbr"
  net.ipv4.tcp_rmem: "4096 131072 6291456"
  net.ipv4.tcp_wmem: "4096 65536 6291456"
  net.ipv4.tcp_fin_timeout: "30"
  net.ipv4.tcp_syn_retries: "5"
  net.ipv4.tcp_synack_retries: "4"
  net.ipv4.tcp_retries2: "12"
  net.ipv4.tcp_mtu_probing: "1"
  net.ipv4.tcp_sack: "1"
  net.ipv4.tcp_dsack: "1"
  net.ipv4.tcp_slow_start_after_idle: "0"
  net.ipv4.tcp_window_scaling: "1"

  net.ipv4.tcp_syncookies: "1"
  net.ipv4.tcp_max_syn_backlog: "4096"
  net.ipv4.icmp_ratelimit: "100"
  net.ipv4.conf.all.accept_source_route: "0"
  net.ipv4.conf.default.accept_source_route: "0"